name: Storm Framework Multi-OS CI Testing

on:
  push:
    branches: [ main, DevExperiment ]
  pull_request:
    branches: [ main, DevExperiment ]
  workflow_dispatch:

jobs:
  # =================================================================
  # JOB 1: NATIVE DOCKER TEST (1 Job)
  # Mengeksekusi setupdocker langsung di level Host OS (tanpa container)
  # Memanfaatkan pre-installed Docker daemon dari GitHub Actions VM
  # =================================================================
  docker-test:
    name: Test docker on native ubuntu host
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Environment
        run: sudo apt-get update && sudo apt-get install -y curl bash jq

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Execute Storm Installation (docker)
        run: bash ./setupdocker

        
      - name: Verify Installation
        run: |
          ls -la /usr/local/bin/storm
          cat /usr/local/bin/storm
          export PATH=$PATH:/usr/local/bin
          storm
          

  # =================================================================
  # JOB 2: CONTAINERIZED SCRIPT TEST (6 Jobs)
  # Mengeksekusi setuplinux & setupvenv di dalam lingkungan yang terisolasi
  # Total eksekusi: 3 OS x 2 Setup = 6 Jobs
  # =================================================================
  script-test:
    name: Test ${{ matrix.setup_type }} on ${{ matrix.os }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu:latest, debian:latest, kalilinux/kali-rolling:latest]
        setup_type: [linux, venv]

    container:
      image: ${{ matrix.os }}
      options: --privileged

    steps:
      - name: Prepare Environment
        run: |
          apt-get update
          apt-get install -y curl sudo bash jq

      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Execute Storm Installation (${{ matrix.setup_type }})
        shell: bash
        run: |
          if [ "${{ matrix.setup_type }}" == "linux" ]; then
            bash ./setuplinux
          elif [ "${{ matrix.setup_type }}" == "venv" ]; then
            bash ./setupvenv
          fi

      - name: Verify Installation and Version
        run: |
          ls -la /usr/local/bin/storm
          cat /usr/local/bin/storm
          export PATH=$PATH:/usr/local/bin
          storm
          
