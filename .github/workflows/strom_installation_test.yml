name: Storm Framework Multi-OS CI Testing

on:
  push:
    branches: [ main, DevExperiment ]
  pull_request:
    branches: [ main, DevExperiment ]
  workflow_dispatch:

jobs:
  # =================================================================
  # JOB 1: NATIVE DOCKER TEST (1 Job)
  # Execute setupdocker directly at the Host OS level (without containers)
  # Leveraging the pre-installed Docker daemon from the GitHub Actions VM
  # =================================================================
  docker-test:
    name: Test docker on native ubuntu host
    runs-on: ubuntu-latest
    steps:
      - name: Prepare Environment
        run: sudo apt-get update && sudo apt-get install -y curl bash jq

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Execute Storm Installation (docker)
        run: bash ./setupdocker

          

  # =================================================================
  # JOB 2: CONTAINERIZED SCRIPT TEST (6 Jobs)
  # Executing setuplinux & setupvenv in an isolated environment
  # Total execution: 3 OS x 2 Setup = 6 Jobs
  # =================================================================
  script-test:
    name: Test ${{ matrix.setup_type }} on ${{ matrix.os }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu:latest, debian:latest, kalilinux/kali-rolling:latest]
        setup_type: [linux, venv]

    container:
      image: ${{ matrix.os }}
      options: --privileged

    steps:
      - name: Prepare Environment
        run: |
          apt-get update
          apt-get install -y curl sudo bash jq

      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Execute Storm Installation (${{ matrix.setup_type }})
        shell: bash
        run: |
          if [ "${{ matrix.setup_type }}" == "linux" ]; then
            bash ./setuplinux
          elif [ "${{ matrix.setup_type }}" == "venv" ]; then
            bash ./setupvenv
          fi

  # =================================================================
  # JOB 3: NATIVE WINDOWS POWERSHELL TEST (1 Job)
  # Melakukan validasi instalasi pada Windows Host menggunakan PowerShell
  # Memastikan kompatibilitas Docker-in-Windows (Linux Containers mode)
  # =================================================================
  windows-test:
    name: Test installation on native windows host
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify and Start Docker Desktop Daemon
        shell: powershell
        run: |
          Write-Host "[+] Memeriksa status Docker Daemon..."
          $DockerCheck = docker info 2>&1
          if ($LASTEXITCODE -ne 0) {
              Write-Host "[*] Docker Desktop tidak berjalan. Mencoba mengaktifkan service..."
              Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue
              
              # Polling hingga daemon siap merespon perintah
              $retryCount = 0
              while ($retryCount -lt 12) {
                  docker info >$null 2>&1
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "[✓] Docker Daemon berhasil diaktifkan."
                      break
                  }
                  Write-Host "[-] Menunggu Docker Daemon siap (5 detik)..."
                  Start-Sleep -Seconds 5
                  $retryCount++
              }
          } else {
              Write-Host "[✓] Docker Daemon sudah siap."
          }

      - name: Execute Storm Installation (PowerShell)
        shell: powershell
        env:
          GITHUB_ACTIONS: "true"
        run: |
          # Eksekusi skrip instalasi Windows (asumsi nama file: install.ps1)
          # Kebijakan eksekusi dilewati khusus untuk proses ini
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\setup.ps1

      - name: Validate Wrapper and Binary Execution
        shell: cmd
        run: |
          :: Menyegarkan Environment Path agar sistem mengenali 'storm' yang baru ditambahkan
          refreshenv
          
          echo "[+] Memvalidasi fungsionalitas wrapper storm..."
          :: Menjalankan command dasar wrapper untuk memastikan kontainer merespon tanpa error
          call storm --update
          
