name: Storm Framework Multi-OS CI Testing

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # =================================================================
  # JOB 1: NATIVE DOCKER TEST (1 Job)
  # Mengeksekusi setupdocker langsung di level Host OS (tanpa container)
  # Memanfaatkan pre-installed Docker daemon dari GitHub Actions VM
  # =================================================================
  docker-test:
    name: Test docker on native ubuntu host
    runs-on: ubuntu-latest
    steps:
      - name: Execute Storm Installation (docker)
        run: curl -fsSL https://raw.githubusercontent.com/StormWorld0/storm-framework/main/setupdocker | bash

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Verify Installation
        run: |
          export PATH=$PATH:/usr/local/bin
          storm || echo "Storm installed but binary not in path"
          

  # =================================================================
  # JOB 2: CONTAINERIZED SCRIPT TEST (6 Jobs)
  # Mengeksekusi setuplinux & setupvenv di dalam lingkungan yang terisolasi
  # Total eksekusi: 3 OS x 2 Setup = 6 Jobs
  # =================================================================
  script-test:
    name: Test ${{ matrix.setup_type }} on ${{ matrix.os }}
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        # Menggunakan format penamaan Docker Hub yang benar (titik dua, bukan strip)
        os: [ubuntu:latest, debian:latest, kalilinux/kali-rolling:latest]
        setup_type: [linux, venv]

    container:
      image: ${{ matrix.os }}
      options: --privileged

    steps:
      - name: Prepare Environment
        run: |
          apt-get update
          apt-get install -y curl sudo bash jq
          
      - name: Execute Storm Installation (${{ matrix.setup_type }})
        run: |
          if [ "${{ matrix.setup_type }}" == "linux" ]; then
            curl -fsSL https://raw.githubusercontent.com/StormWorld0/storm-framework/main/setuplinux | bash
          elif [ "${{ matrix.setup_type }}" == "venv" ]; then
            curl -fsSL https://raw.githubusercontent.com/StormWorld0/storm-framework/main/setupvenv | bash
          fi

      - name: Verify Installation and Version
        run: |
          export PATH=$PATH:/usr/local/bin
          storm || echo "Storm installed but binary not in path"
          
