name: Windows Testing

on:
  push:
    branches: [ main, DevExperiment ]
  pull_request:
    branches: [ main, DevExperiment ]
  workflow_dispatch:

jobs:

  # =================================================================
  # NATIVE WINDOWS POWERSHELL TEST (1 Job)
  # Melakukan validasi instalasi pada Windows Host menggunakan PowerShell
  # Memastikan kompatibilitas Docker-in-Windows (Linux Containers mode)
  # =================================================================
  windows-test:
    name: Test installation on native windows host
    runs-on: 
        - windows-2022
        - ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify and Start Docker Desktop Daemon
        shell: pwsh
        run: |
          Write-Host "[+] Memeriksa status Docker Daemon..."
          $DockerCheck = docker info 2>&1
          if ($LASTEXITCODE -ne 0) {
              Write-Host "[*] Docker Desktop tidak berjalan. Mencoba mengaktifkan service..."
              Start-Service -Name "com.docker.service" -ErrorAction SilentlyContinue
              
              # Polling hingga daemon siap merespon perintah
              $retryCount = 0
              while ($retryCount -lt 12) {
                  docker info >$null 2>&1
                  if ($LASTEXITCODE -eq 0) {
                      Write-Host "[OK] Docker Daemon berhasil diaktifkan."
                      break
                  }
                  Write-Host "[-] Menunggu Docker Daemon siap (5 detik)..."
                  Start-Sleep -Seconds 5
                  $retryCount++
              }
          } else {
              Write-Host "[OK] Docker Daemon sudah siap."
          }

      - name: Execute Storm Installation (PowerShell)
        shell: pwsh
        env:
          GITHUB_ACTIONS: "true"
        run: |
          # Eksekusi skrip instalasi Windows
          # Kebijakan eksekusi dilewati khusus untuk proses ini
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\setup.ps1

      - name: Validate Wrapper and Binary Execution
        shell: cmd
        run: |
          echo "[+] Memvalidasi fungsionalitas wrapper storm..."
          :: Menjalankan command dasar wrapper untuk memastikan kontainer merespon tanpa error
          call storm
          
